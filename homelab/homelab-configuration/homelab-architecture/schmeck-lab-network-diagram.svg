<svg width="100%" viewBox="0 0 680 620" role="img" xmlns="http://www.w3.org/2000/svg">
<title>schmeck.lab homelab network diagram</title>
<desc>Network topology diagram showing the Debian 13 host running KVM/QEMU with pfSense, Kali, Ubuntu/Splunk, DC01, and WIN11 VMs across two virtual networks.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
<style>
  .th { font-family: sans-serif; font-size: 14px; font-weight: 500; fill: #1a1a1a; }
  .ts { font-family: sans-serif; font-size: 12px; font-weight: 400; fill: #555; }
  .c-gray > rect { fill: #F1EFE8; stroke: #888780; }
  .c-teal > rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal > text.th { fill: #085041; }
  .c-teal > text.ts { fill: #0F6E56; }
  .c-purple > rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple > text.th { fill: #3C3489; }
  .c-purple > text.ts { fill: #534AB7; }
  .c-coral > rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral > text.th { fill: #712B13; }
  .c-coral > text.ts { fill: #993C1D; }
  .c-blue > rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue > text.th { fill: #0C447C; }
  .c-blue > text.ts { fill: #185FA5; }
</style>
</defs>

<!-- Debian 13 host outer container -->
<g class="c-gray">
<rect x="30" y="20" width="620" height="580" rx="16" stroke-width="0.5"/>
<text class="th" x="50" y="48">Debian 13 host — KVM/QEMU</text>
<text class="ts" x="50" y="64">LUKS2 · nftables · daily-driver workstation</text>
</g>

<!-- virbr0 NAT network -->
<g class="c-gray">
<rect x="52" y="82" width="180" height="76" rx="10" stroke-width="0.5"/>
<text class="th" x="142" y="108" text-anchor="middle">virbr0</text>
<text class="ts" x="142" y="124" text-anchor="middle">NAT — libvirt default</text>
<text class="ts" x="142" y="140" text-anchor="middle">not used for lab traffic</text>
</g>

<!-- virbr-lan isolated network -->
<g class="c-teal">
<rect x="270" y="82" width="358" height="76" rx="10" stroke-width="0.5"/>
<text class="th" x="449" y="108" text-anchor="middle">virbr-lan</text>
<text class="ts" x="449" y="124" text-anchor="middle">isolated lab segment · 192.168.10.0/24</text>
<text class="ts" x="449" y="140" text-anchor="middle">all VM-to-VM lab traffic</text>
</g>

<!-- pfSense VM -->
<g class="c-purple">
<rect x="52" y="210" width="180" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="142" y="238" text-anchor="middle">pfSense</text>
<text class="ts" x="142" y="256" text-anchor="middle">WAN gateway · router</text>
<text class="ts" x="142" y="272" text-anchor="middle">bridges virbr0 → virbr-lan</text>
</g>

<!-- Kali Linux VM -->
<g class="c-coral">
<rect x="270" y="210" width="158" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="349" y="238" text-anchor="middle">Kali Linux</text>
<text class="ts" x="349" y="256" text-anchor="middle">attacker VM</text>
<text class="ts" x="349" y="272" text-anchor="middle">192.168.10.55</text>
</g>

<!-- Ubuntu / Splunk VM -->
<g class="c-blue">
<rect x="460" y="210" width="168" height="72" rx="8" stroke-width="0.5"/>
<text class="th" x="544" y="238" text-anchor="middle">Ubuntu 24.04</text>
<text class="ts" x="544" y="256" text-anchor="middle">Splunk Enterprise</text>
<text class="ts" x="544" y="272" text-anchor="middle">192.168.10.50</text>
</g>

<!-- DC01 VM -->
<g class="c-teal">
<rect x="270" y="380" width="158" height="86" rx="8" stroke-width="0.5"/>
<text class="th" x="349" y="408" text-anchor="middle">DC01</text>
<text class="ts" x="349" y="426" text-anchor="middle">Windows Server 2022</text>
<text class="ts" x="349" y="442" text-anchor="middle">domain controller</text>
<text class="ts" x="349" y="458" text-anchor="middle">192.168.10.100</text>
</g>

<!-- WIN11 VM -->
<g class="c-teal">
<rect x="460" y="380" width="168" height="86" rx="8" stroke-width="0.5"/>
<text class="th" x="544" y="408" text-anchor="middle">WIN11</text>
<text class="ts" x="544" y="426" text-anchor="middle">Windows 11 Pro</text>
<text class="ts" x="544" y="442" text-anchor="middle">domain-joined workstation</text>
<text class="ts" x="544" y="458" text-anchor="middle">192.168.10.54</text>
</g>

<!-- schmeck.lab domain label -->
<g class="c-teal">
<rect x="270" y="496" width="358" height="40" rx="8" stroke-width="0.5"/>
<text class="th" x="449" y="520" text-anchor="middle">schmeck.lab · SCHMECK NetBIOS · Windows Server 2016 forest</text>
</g>

<!-- Splunk forwarder bar -->
<g class="c-blue">
<rect x="270" y="550" width="358" height="34" rx="8" stroke-width="0.5"/>
<text class="ts" x="449" y="571" text-anchor="middle" dominant-baseline="central">Splunk UF on DC01 + WIN11 → port 9997 → Splunk at 192.168.10.50</text>
</g>

<!-- virbr0 → pfSense -->
<line x1="142" y1="158" x2="142" y2="210" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- virbr-lan → Kali -->
<line x1="349" y1="158" x2="349" y2="210" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- virbr-lan → Ubuntu/Splunk -->
<line x1="544" y1="158" x2="544" y2="210" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- pfSense → virbr-lan bridge -->
<path d="M232 246 L270 246" stroke="#888780" stroke-width="0.5" stroke-dasharray="4 3" fill="none" marker-end="url(#arrow)"/>

<!-- virbr-lan → DC01 -->
<line x1="349" y1="282" x2="349" y2="380" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- virbr-lan → WIN11 -->
<line x1="544" y1="282" x2="544" y2="380" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- DC01 → domain bar -->
<line x1="349" y1="466" x2="349" y2="496" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

<!-- WIN11 → domain bar -->
<line x1="544" y1="466" x2="544" y2="496" stroke="#888780" stroke-width="0.5" marker-end="url(#arrow)" fill="none"/>

</svg>
